<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOURCE — Sale / Catálogo</title>
  <meta name="description" content="Confira os produtos da coleção SOURCE — Drop 1.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================
       HEADER (mesmo padrão de todas as páginas)
  ============================================= -->
  <header class="header" id="site-header">
    <div class="header__inner">
      <a href="index.html" class="logo" aria-label="SOURCE — página inicial">SOURCE</a>

      <form class="header__search" role="search" action="sale.html" method="get">
        <input type="search" name="busca" class="header__search-input" placeholder="Buscar produtos" aria-label="Buscar produtos">
        <button type="submit" class="header__search-btn" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </form>

      <nav class="header__actions" aria-label="Ações da conta">
        <a href="login.html" class="icon-btn" aria-label="Entrar ou criar conta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>

        <button class="icon-btn icon-btn--cart" aria-label="Carrinho de compras">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count" id="cart-count">0</span>
        </button>
      </nav>
    </div>

    <nav class="header__categories" aria-label="Categorias de produtos">
      <a href="sale.html?cat=novidades">NOVIDADES</a>
      <a href="sale.html?cat=sale" class="header__categories-link--ativo">SALE</a>
      <a href="contato.html">CONTATOS</a>
      <a href="sale.html?cat=collabs">COLLABS</a>
    </nav>
  </header>

  <!-- ============================================
       BARRA DE FILTROS / ORDENAÇÃO
  ============================================= -->
  <div class="catalog-toolbar">
    <p class="catalog-toolbar__count" id="catalog-count">0 produtos</p>

    <div class="catalog-toolbar__filters">
      <select class="catalog-select" id="catalog-filter-categoria" aria-label="Filtrar por categoria">
        <option value="todos">Todas as categorias</option>
        <option value="camiseta">Camisetas</option>
        <option value="moletom">Moletons</option>
        <option value="calca">Calças</option>
      </select>

      <select class="catalog-select" id="catalog-sort" aria-label="Ordenar produtos">
        <option value="relevancia">Ordenar por: Relevância</option>
        <option value="menor-preco">Menor preço</option>
        <option value="maior-preco">Maior preço</option>
      </select>
    </div>
  </div>

  <!-- ============================================
       CATÁLOGO DE PRODUTOS
       O grid é renderizado dinamicamente pelo app.js,
       a partir do array PRODUTOS (mock hoje, Supabase depois).
  ============================================= -->
  <main class="catalog-container">
    <div class="product-grid" id="product-grid" aria-live="polite">
      <!-- Cards inseridos via JS -->
    </div>
  </main>

  <!-- ============================================
       FOOTER INSTITUCIONAL (mesmo padrão do login.html)
  ============================================= -->
  <footer class="site-footer">
    <div class="site-footer__grid">

      <div class="site-footer__col">
        <p class="site-footer__heading">Assine nossa newsletter</p>
        <form class="site-footer__newsletter-form" id="newsletter-form">
          <input type="email" class="site-footer__input" placeholder="Seu e-mail" aria-label="E-mail para newsletter" required>
          <button type="submit" class="icon-btn" aria-label="Assinar newsletter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>
      </div>

      <div class="site-footer__col">
        <p class="site-footer__heading">Links úteis</p>
        <ul class="site-footer__links">
          <li><a href="index.html">Início</a></li>
          <li><a href="sale.html">Produtos</a></li>
          <li><a href="#">Quem Somos</a></li>
          <li><a href="#">Troca e Devoluções</a></li>
          <li><a href="#">Política de Privacidade</a></li>
        </ul>
      </div>

      <div class="site-footer__col">
        <p class="site-footer__heading">Entre em contato</p>
        <p class="site-footer__contact">contato@sourceclothing.com.br</p>
        <p class="site-footer__contact">Seg. a Sex. — 9h às 18h</p>
      </div>

    </div>

    <div class="site-footer__bottom">
      <div class="site-footer__socials">
        <a class="site-footer__icon-btn" href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <line x1="17.5" y1="6.5" x2="17.5" y2="6.5"></line>
          </svg>
        </a>
        <a class="site-footer__icon-btn" href="#" aria-label="WhatsApp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
          </svg>
        </a>
      </div>

      <div class="site-footer__payments">
        <span class="site-footer__icon-btn" aria-label="Cartão de crédito">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="2" y="5" width="20" height="14" rx="2"></rect>
            <line x1="2" y1="10" x2="22" y2="10"></line>
          </svg>
        </span>
        <span class="site-footer__icon-btn" aria-label="Pix">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <rect x="7" y="7" width="10" height="10" rx="2" transform="rotate(45 12 12)"></rect>
          </svg>
        </span>
      </div>

      <div class="site-footer__badge" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M8 8 L32 32 M32 8 L8 32" stroke-linecap="round"></path>
          <circle cx="20" cy="20" r="17"></circle>
        </svg>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script src="sale.js"></script>
</body>
</html>
